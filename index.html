<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贝壳日记 | Shell Diary</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            min-height: 100vh;
            background: linear-gradient(180deg,
                #1a3a5a 0%,
                #2d5a7b 15%,
                #4a7a9b 30%,
                #7eb3c9 45%,
                #a8d4e6 55%,
                #f0c4c4 65%,
                #f8d4d4 75%,
                #ffe4e8 85%,
                #fff5f5 100%);
            background-attachment: fixed;
            padding: 20px;
            padding-bottom: 200px;
        }

        /* 贝壳装饰 */
        .shell-decoration {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .shell {
            position: absolute;
            font-size: 3rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }

        .shell:nth-child(1) { left: 5%; bottom: 10px; animation-delay: 0s; }
        .shell:nth-child(2) { left: 25%; bottom: 5px; animation-delay: -1s; font-size: 2.5rem; }
        .shell:nth-child(3) { left: 45%; bottom: 15px; animation-delay: -2s; }
        .shell:nth-child(4) { left: 65%; bottom: 8px; animation-delay: -3s; font-size: 2rem; }
        .shell:nth-child(5) { left: 85%; bottom: 12px; animation-delay: -4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        /* 气泡 */
        .bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            bottom: -50px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), rgba(255,200,200,0.2));
            border-radius: 50%;
            animation: rise linear infinite;
        }

        @keyframes rise {
            0% { bottom: -50px; opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { bottom: 110%; opacity: 0; }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 标题 */
        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
        }

        h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 2px 2px 8px rgba(100,50,50,0.3);
            margin-bottom: 5px;
        }

        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }

        /* 日记卡片 */
        .diary-card {
            background: linear-gradient(135deg,
                rgba(255, 240, 245, 0.95) 0%,
                rgba(255, 230, 235, 0.95) 100%);
            border-radius: 30px;
            padding: 25px;
            box-shadow:
                0 10px 40px rgba(200, 100, 120, 0.2),
                inset 0 1px 0 rgba(255,255,255,0.8);
            border: 2px solid rgba(255, 200, 210, 0.5);
            position: relative;
            overflow: hidden;
        }

        .diary-card::before {
            content: '🐚';
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            opacity: 0.3;
        }

        /* 日期选择 */
        .date-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255, 180, 190, 0.4);
            border-radius: 15px;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.2rem;
            color: #8b5a6b;
            background: rgba(255,255,255,0.6);
            margin-bottom: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .date-input:focus {
            border-color: #f8b4c4;
            box-shadow: 0 0 15px rgba(248, 180, 196, 0.3);
        }

        /* 文字编辑区 */
        .diary-input {
            width: 100%;
            min-height: 200px;
            padding: 20px;
            border: none;
            border-radius: 20px;
            font-size: 1.1rem;
            line-height: 2;
            color: #5a3a4a;
            background: rgba(255, 255, 255, 0.7);
            resize: none;
            outline: none;
            transition: all 0.3s;
        }

        .diary-input:focus {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(248, 180, 196, 0.2);
        }

        /* 照片上传区域 */
        .photo-upload-area {
            margin-top: 15px;
        }

        .photo-upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #ffe4e8 0%, #fff5f5 100%);
            border: 2px dashed rgba(255, 180, 190, 0.5);
            border-radius: 20px;
            color: #c08090;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .photo-upload-btn:hover {
            background: linear-gradient(135deg, #fff0f2 0%, #fff 100%);
            border-color: #f0a0b0;
        }

        .photo-upload-btn input {
            display: none;
        }

        /* 照片预览网格 */
        .photo-preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .photo-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-item .delete-photo {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 25px;
            height: 25px;
            background: rgba(200,100,120,0.9);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .photo-item:hover .delete-photo {
            opacity: 1;
        }

        /* 预览区 */
        .preview-area {
            margin-top: 20px;
            padding: 30px;
            border-radius: 20px;
            min-height: 200px;
            position: relative;
            overflow: hidden;
        }

        .preview-date {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.3rem;
            color: #c4a0a8;
            margin-bottom: 15px;
            text-align: center;
        }

        /* 预览照片区域 */
        .preview-photos {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }

        .preview-photo {
            max-width: 150px;
            max-height: 150px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            object-fit: cover;
        }

        .preview-text {
            font-size: 1.1rem;
            line-height: 2.2;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* 控制面板触发按钮 */
        .panel-toggle {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #b8e0f7 0%, #d4eef8 100%);
            border: 3px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(100, 160, 210, 0.4);
            z-index: 100;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(100, 160, 210, 0.5);
        }

        /* 控制面板遮罩 */
        .panel-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.35);
            z-index: 150;
        }

        .panel-overlay.active {
            display: block;
        }

        /* 控制面板抽屉 */
        .control-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            max-height: 80vh;
            background: linear-gradient(180deg,
                rgba(255, 245, 248, 0.99) 0%,
                rgba(255, 240, 245, 0.99) 100%);
            border-radius: 30px 30px 0 0;
            padding: 0 20px 30px;
            box-shadow: 0 -8px 40px rgba(200, 100, 120, 0.2);
            z-index: 200;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .control-panel.active {
            transform: translateY(0);
        }

        /* 抽屉顶部拖把手 */
        .panel-handle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0 10px;
            position: sticky;
            top: 0;
            background: linear-gradient(180deg, rgba(255,245,248,1) 80%, rgba(255,245,248,0) 100%);
            z-index: 1;
            margin-bottom: 5px;
        }

        .panel-handle-bar {
            width: 40px;
            height: 4px;
            background: rgba(200,150,160,0.4);
            border-radius: 2px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 8px;
        }

        .panel-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.3rem;
            color: #8b6b7b;
        }

        .close-panel {
            width: 36px;
            height: 36px;
            background: rgba(200,100,120,0.1);
            border: none;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            color: #c08090;
        }

        .close-panel:hover {
            background: rgba(200,100,120,0.2);
        }

        .control-section {
            margin-bottom: 20px;
        }

        .control-section:last-child {
            margin-bottom: 0;
        }

        .control-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            color: #8b6b7b;
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* 字体选择 */
        .font-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .font-btn {
            padding: 8px 15px;
            border: 2px solid rgba(255, 180, 190, 0.4);
            border-radius: 20px;
            background: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            color: #7a5a6a;
            cursor: pointer;
            transition: all 0.3s;
        }

        .font-btn:hover, .font-btn.active {
            background: linear-gradient(135deg, #f8d4d8 0%, #ffe4e8 100%);
            border-color: #f0a0b0;
            color: #6a4a5a;
        }

        /* 文件上传 */
        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #f0c4c8 0%, #f8d4d8 100%);
            border: 2px dashed rgba(200, 100, 120, 0.4);
            border-radius: 20px;
            color: #7a5a6a;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .upload-btn:hover {
            background: linear-gradient(135deg, #f8d4d8 0%, #ffe4e8 100%);
            border-color: #f0a0b0;
        }

        .upload-btn input {
            display: none;
        }

        /* 颜色选择 */
        .color-picker {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .color-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-dot {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid rgba(255,255,255,0.8);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            transition: all 0.3s;
        }

        .color-dot:hover, .color-dot.active {
            transform: scale(1.15);
            box-shadow: 0 3px 12px rgba(0,0,0,0.25);
        }

        /* 滑块 */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slider {
            flex: 1;
            -webkit-appearance: none;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, rgba(255,200,210,0.3) 0%, #f8b4c4 100%);
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f8d4d8 0%, #f0a0b0 100%);
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(200,100,120,0.3);
        }

        .slider-value {
            font-size: 0.9rem;
            color: #8b6b7b;
            min-width: 45px;
            text-align: right;
        }

        /* 按钮组 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        /* 下载按钮 */
        .download-btn, .save-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 25px;
            background: linear-gradient(135deg, #f0a0b0 0%, #e08090 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(200, 100, 120, 0.3);
        }

        .save-btn {
            background: linear-gradient(135deg, #7ec8e3 0%, #5fb3d3 100%);
        }

        .download-btn:hover, .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(200, 100, 120, 0.4);
        }

        .save-btn:hover {
            box-shadow: 0 8px 25px rgba(100, 180, 220, 0.4);
        }

        /* Canvas */
        #exportCanvas {
            display: none;
        }

        /* 已选文件显示 */
        .selected-file {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            background: rgba(248, 180, 196, 0.3);
            border-radius: 15px;
            font-size: 0.8rem;
            color: #7a5a6a;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .remove-file {
            cursor: pointer;
            opacity: 0.6;
        }

        .remove-file:hover {
            opacity: 1;
        }

        .tip {
            font-size: 0.8rem;
            color: #a88a98;
            margin-top: 8px;
        }

        /* ========== 日记书架 ========== */
        
        /* 书架按钮 */
        .bookshelf-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #f0c4c8 0%, #f8d4d8 100%);
            border: 3px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(200, 100, 120, 0.4);
            z-index: 100;
            transition: all 0.3s;
        }

        .bookshelf-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(200, 100, 120, 0.5);
        }

        .bookshelf-toggle span {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 日记数量徽章 */
        .diary-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e08090;
            color: white;
            font-size: 0.7rem;
            min-width: 22px;
            height: 22px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Ma Shan Zheng', cursive;
        }

        /* 书架模态框 */
        .bookshelf-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .bookshelf-modal.active {
            display: flex;
        }

        /* 书本容器 */
        .book-container {
            width: 100%;
            max-width: 500px;
            height: 80vh;
            perspective: 2000px;
            position: relative;
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        /* 书页 */
        .book-page {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fff9fa 0%, #fff5f7 100%);
            border-radius: 5px 15px 15px 5px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
            overflow-y: auto;
            backface-visibility: hidden;
        }

        .book-page::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, #f0d4d8 0%, #e8c4c8 50%, #f0d4d8 100%);
        }

        /* 书架头部 */
        .shelf-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed rgba(200,150,160,0.3);
        }

        .shelf-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.8rem;
            color: #8b6b7b;
        }

        .close-shelf {
            width: 40px;
            height: 40px;
            background: rgba(200,100,120,0.1);
            border: none;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-shelf:hover {
            background: rgba(200,100,120,0.2);
        }

        /* 翻页导航 */
        .page-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .page-nav button {
            padding: 10px 25px;
            background: linear-gradient(135deg, #f0a0b0 0%, #e08090 100%);
            border: none;
            border-radius: 20px;
            color: white;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-nav button:hover {
            transform: scale(1.05);
        }

        .page-nav button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-indicator {
            display: flex;
            align-items: center;
            font-family: 'Ma Shan Zheng', cursive;
            color: #8b6b7b;
        }

        /* 日记条目 */
        .diary-entry {
            background: rgba(255,255,255,0.8);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .diary-entry:hover {
            border-color: #f8b4c4;
            transform: translateX(5px);
        }

        .diary-entry-thumb {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            margin-bottom: 10px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            text-shadow: 0 2px 10px rgba(255,255,255,0.8);
        }

        .diary-entry-date {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.1rem;
            color: #c4a0a8;
            margin-bottom: 5px;
        }

        .diary-entry-preview {
            font-size: 0.9rem;
            color: #7a5a6a;
            line-height: 1.5;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .diary-entry-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .diary-entry-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .load-btn {
            background: rgba(126,200,227,0.2);
            color: #5fb3d3;
        }

        .delete-btn {
            background: rgba(200,100,120,0.1);
            color: #e08090;
        }

        /* 空书架提示 */
        .empty-shelf {
            text-align: center;
            padding: 50px 20px;
            color: #a88a98;
        }

        .empty-shelf-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-shelf-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.3rem;
        }

        /* 日记详情页 */
        .diary-detail {
            display: none;
        }

        .diary-detail.active {
            display: block;
        }

        .diary-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-list {
            padding: 8px 15px;
            background: rgba(200,100,120,0.1);
            border: none;
            border-radius: 15px;
            color: #e08090;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .diary-detail-content {
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            padding: 25px;
            min-height: 300px;
        }

        .diary-detail-date {

            <!-- 背景颜色 -->

                        <div class="color-dot" style="background: linear-gradient(135deg, #e8f4fc, #f0f8ff);" data-color="linear-gradient(135deg, #e8f4fc, #f0f8ff)"></div>
                        <div class="color-dot" style="background: linear-gradient(135deg, #fff8dc, #fffacd);" data-color="linear-gradient(135deg, #fff8dc, #fffacd)"></div>
                        <div class="color-dot" style="background: linear-gradient(135deg, #f5f5dc, #fffaf0);" data-color="linear-gradient(135deg, #f5f5dc, #fffaf0)"></div>

    <!-- 控制面板触发按钮 -->

    <!-- 书架模态框 -->
    <div class="bookshelf-modal" id="bookshelfModal">

                <!-- 日记列表页 -->

    <script>
        // ========== 基础功能 ==========
        
        // 气泡效果
        function createBubbles() {
            const container = document.getElementById('bubbles');
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 20 + 5;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDuration = Math.random() * 10 + 8 + 's';
                bubble.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(bubble);
            }
        }
        createBubbles();

        // 元素
        const diaryInput = document.getElementById('diaryInput');
        const diaryDate = document.getElementById('diaryDate');
        const previewArea = document.getElementById('previewArea');
        const previewText = document.getElementById('previewText');
        const previewDate = document.getElementById('previewDate');
        const previewPhotos = document.getElementById('previewPhotos');
        const photoPreviewGrid = document.getElementById('photoPreviewGrid');
        const fontBtns = document.querySelectorAll('.font-btn');
        const bgOpacity = document.getElementById('bgOpacity');
        const textOpacity = document.getElementById('textOpacity');
        const fontSizeEl = document.getElementById('fontSize');
        const downloadBtn = document.getElementById('downloadBtn');
        const saveBtn = document.getElementById('saveBtn');

        // 设置默认日期为今天
        const today = new Date().toISOString().split('T')[0];
        diaryDate.value = today;

        // 状态
        let state = {
            font: "'Noto Serif SC', serif",
            fontSize: 18,
            bgColor: 'linear-gradient(135deg, #ffe4e8, #fff5f5)',
            bgOpacity: 70,
            textColor: '#5a3a4a',
            textOpacity: 100,
            bgImage: null,
            photos: [], // 照片数组
            customFonts: []
        };



        // 照片上传处理
        document.getElementById('photoUpload').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    state.photos.push(e.target.result);
                    renderPhotoPreviews();
                    updatePreview();
                };
                reader.readAsDataURL(file);
            });
            // 清空input以允许重新选择相同文件
            e.target.value = '';
        });

        // 渲染照片预览网格
        function renderPhotoPreviews() {
            photoPreviewGrid.innerHTML = state.photos.map((photo, index) => `
                <div class="photo-item">
                    <img src="${photo}" alt="照片 ${index + 1}">
                    <button class="delete-photo" onclick="deletePhoto(${index})">✕</button>
                </div>
            `).join('');
        }

        // 删除照片
        function deletePhoto(index) {
            state.photos.splice(index, 1);
            renderPhotoPreviews();
            updatePreview();
        }

        // 更新预览
        function updatePreview() {
            const text = diaryInput.value || '在这里写下你的心情...';
            previewText.textContent = text;
            previewText.style.fontFamily = state.font;
            previewText.style.fontSize = state.fontSize + 'px';
            previewText.style.color = state.textColor;
            previewText.style.opacity = state.textOpacity / 100;

            if (diaryDate.value) {
                const date = new Date(diaryDate.value);
                const dateStr = date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
                previewDate.textContent = '🐚 ' + dateStr + ' 🐚';
            }

            // 渲染预览照片
            previewPhotos.innerHTML = state.photos.map(photo => 
                `<img src="${photo}" class="preview-photo" alt="日记照片">`
            ).join('');

            // 背景单独控制透明度，不影响文字
            let bg = state.bgColor;
            if (state.bgImage) {
                // 图片背景：用伪元素或单独的背景层控制透明度
                previewArea.style.background = `linear-gradient(rgba(255,255,255,${1 - state.bgOpacity/100}), rgba(255,255,255,${1 - state.bgOpacity/100})), url(${state.bgImage})`;
                previewArea.style.backgroundSize = 'cover';
                previewArea.style.backgroundPosition = 'center';
                previewArea.style.opacity = 1;
            } else {
                // 渐变色背景：解析颜色并应用透明度
                const opacity = state.bgOpacity / 100;
                const colors = state.bgColor.match(/#[a-fA-F0-9]{6}/g) || ['#ffe4e8', '#fff5f5'];
                const color1 = hexToRgba(colors[0], opacity);
                const color2 = hexToRgba(colors[1] || colors[0], opacity);
                previewArea.style.background = `linear-gradient(135deg, ${color1}, ${color2})`;
                previewArea.style.opacity = 1;
            }
        }

        // 辅助函数：hex转rgba
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // 监听输入
        diaryInput.addEventListener('input', updatePreview);
        diaryDate.addEventListener('change', updatePreview);

        // 字体选择
        fontBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                fontBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.font = btn.dataset.font;
                updatePreview();
            });
        });

        // 自定义字体上传
        document.getElementById('fontUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const fontName = 'customFont_' + Date.now();
            const url = URL.createObjectURL(file);
            const font = new FontFace(fontName, `url(${url})`);
            
            try {
                await font.load();
                document.fonts.add(font);
                
                // 保存到 IndexedDB
                await saveFontToDB(fontName, file);
                
                state.customFonts.push({ name: fontName, file: file.name });
                
                const newBtn = document.createElement('button');
                newBtn.className = 'font-btn';
                newBtn.dataset.font = fontName;
                newBtn.textContent = '📎 ' + file.name.slice(0, 10);
                newBtn.addEventListener('click', () => {
                    fontBtns.forEach(b => b.classList.remove('active'));
                    newBtn.classList.add('active');
                    state.font = fontName;
                    updatePreview();
                });
                document.querySelector('.font-buttons').appendChild(newBtn);

                const fileDiv = document.createElement('div');
                fileDiv.className = 'selected-file';
                fileDiv.innerHTML = `📎 ${file.name.slice(0, 15)}... <span class="remove-file" onclick="removeDBFont('${fontName}', this)">✕</span>`;
                document.getElementById('fontFiles').appendChild(fileDiv);

                newBtn.click();
            } catch (err) {
                console.error('字体加载失败:', err);
                alert('字体加载失败，请尝试其他格式');
            }
        });

        // 背景图片上传
        document.getElementById('bgUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                state.bgImage = e.target.result;
                
                const fileDiv = document.createElement('div');
                fileDiv.className = 'selected-file';
                fileDiv.innerHTML = `🖼️ ${file.name.slice(0, 15)} <span class="remove-file" onclick="clearBgImage(this)">✕</span>`;
                fileDiv.dataset.image = e.target.result;
                document.getElementById('bgFiles').appendChild(fileDiv);
                
                updatePreview();
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        });

        function clearBgImage(el) {
            if (state.bgImage) {
                state.bgImage = null;
                el.parentElement.remove();
                updatePreview();
            }
        }

        // 背景颜色选择
        document.querySelectorAll('[data-color]').forEach(dot => {
            dot.addEventListener('click', () => {
                document.querySelectorAll('[data-color]').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                state.bgColor = dot.dataset.color;
                updatePreview();
            });
        });

        // 文字颜色选择
        document.querySelectorAll('[data-textcolor]').forEach(dot => {
            dot.addEventListener('click', () => {
                document.querySelectorAll('[data-textcolor]').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                state.textColor = dot.dataset.textcolor;
                document.getElementById('customTextColor').value = dot.dataset.textcolor;
                updatePreview();
            });
        });

        // 自定义颜色
        document.getElementById('customTextColor').addEventListener('input', (e) => {
            state.textColor = e.target.value;
            document.querySelectorAll('[data-textcolor]').forEach(d => d.classList.remove('active'));
            updatePreview();
        });

        // 滑块控制
        bgOpacity.addEventListener('input', (e) => {
            state.bgOpacity = parseInt(e.target.value);
            document.getElementById('bgOpacityValue').textContent = state.bgOpacity + '%';
            updatePreview();
        });

        textOpacity.addEventListener('input', (e) => {
            state.textOpacity = parseInt(e.target.value);
            document.getElementById('textOpacityValue').textContent = state.textOpacity + '%';
            updatePreview();
        });

        fontSizeEl.addEventListener('input', (e) => {
            state.fontSize = parseInt(e.target.value);
            document.getElementById('fontSizeValue').textContent = state.fontSize + 'px';
            updatePreview();
        });

        // ========== 日记存储 ==========
        
        const STORAGE_KEY = 'shellDiaryEntries';

        function getDiaries() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveDiaries(diaries) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(diaries));
            updateDiaryCount();
        }

        function addDiary(entry) {
            const diaries = getDiaries();
            const existingIndex = diaries.findIndex(d => d.date === entry.date);
            if (existingIndex >= 0) {
                diaries[existingIndex] = entry;
            } else {
                diaries.unshift(entry);
            }
            saveDiaries(diaries);
        }

        function deleteDiary(date) {
            const diaries = getDiaries();
            const newDiaries = diaries.filter(d => d.date !== date);
            saveDiaries(newDiaries);
            renderDiaryList();
        }

        function updateDiaryCount() {
            const diaries = getDiaries();
            document.getElementById('diaryCount').textContent = diaries.length;
        }

        // ========== 保存日记 ==========
        
        saveBtn.addEventListener('click', () => {
            if (!diaryInput.value.trim() && state.photos.length === 0) {
                alert('请先写点什么或添加照片再保存哦～ 🐚');
                return;
            }

            const entry = {
                date: diaryDate.value,
                text: diaryInput.value,
                font: state.font,
                fontSize: state.fontSize,
                bgColor: state.bgColor,
                bgOpacity: state.bgOpacity,
                textColor: state.textColor,
                textOpacity: state.textOpacity,
                bgImage: state.bgImage,
                photos: state.photos, // 保存照片
                savedAt: new Date().toISOString()
            };

            addDiary(entry);
            
            // 视觉反馈
            saveBtn.textContent = '✅ 已保存';
            setTimeout(() => {
                saveBtn.textContent = '💾 保存日记';
            }, 1500);
        });

        // ========== 截图下载功能 ==========
        
        downloadBtn.addEventListener('click', async () => {
            const previewArea = document.getElementById('previewArea');
            
            // 临时调整预览区域样式以便截图
            const originalStyle = previewArea.style.cssText;
            previewArea.style.width = '600px';
            previewArea.style.minHeight = '400px';
            
            try {
                downloadBtn.textContent = '📸 截图中...';
                downloadBtn.disabled = true;
                
                const canvas = await html2canvas(previewArea, {
                    scale: 2, // 高清截图
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: null,
                    logging: false
                });
                
                // 下载图片
                const link = document.createElement('a');
                link.download = `贝壳日记_${diaryDate.value || new Date().toISOString().split('T')[0]}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
            } catch (err) {
                console.error('截图失败:', err);
                alert('截图失败，请重试');
            } finally {
                // 恢复原始样式
                previewArea.style.cssText = originalStyle;
                downloadBtn.textContent = '📥 下载图片';
                downloadBtn.disabled = false;
            }
        });

        // ========== 书架功能 ==========
        
        const bookshelfToggle = document.getElementById('bookshelfToggle');
        const bookshelfModal = document.getElementById('bookshelfModal');
        const closeShelf = document.getElementById('closeShelf');
        const diaryList = document.getElementById('diaryList');
        const diaryListPage = document.getElementById('diaryListPage');
        const diaryDetailPage = document.getElementById('diaryDetailPage');
        const backToList = document.getElementById('backToList');
        const prevPageBtn = document.getElementById('prevPage');
        const nextPageBtn = document.getElementById('nextPage');

        let currentPage = 1;
        const itemsPerPage = 3;
        let currentViewDiary = null;

        bookshelfToggle.addEventListener('click', () => {
            bookshelfModal.classList.add('active');
            renderDiaryList();
        });

        closeShelf.addEventListener('click', () => {
            bookshelfModal.classList.remove('active');
        });

        bookshelfModal.addEventListener('click', (e) => {
            if (e.target === bookshelfModal) {
                bookshelfModal.classList.remove('active');
            }
        });

        backToList.addEventListener('click', () => {
            diaryDetailPage.style.display = 'none';
            diaryListPage.style.display = 'block';
            renderDiaryList();
        });

        function renderDiaryList() {
            const diaries = getDiaries();
            diaryListPage.style.display = 'block';
            diaryDetailPage.style.display = 'none';

            if (diaries.length === 0) {
                diaryList.innerHTML = `
                    <div class="empty-shelf">
                        <div class="empty-shelf-icon">🐚</div>
                        <div class="empty-shelf-text">还没有日记哦～<br>快去写第一篇吧！</div>
                    </div>
                `;
                document.getElementById('listNav').style.display = 'none';
                return;
            }

            const totalPages = Math.ceil(diaries.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageDiaries = diaries.slice(startIndex, endIndex);

            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('totalPages').textContent = totalPages;
            
            prevPageBtn.disabled = currentPage === 1;
            nextPageBtn.disabled = currentPage === totalPages;
            document.getElementById('listNav').style.display = totalPages > 1 ? 'flex' : 'none';

            diaryList.innerHTML = pageDiaries.map(diary => {
                const thumbStyle = diary.bgImage ? `background: url(${diary.bgImage}); background-size: cover; background-position: center;` : `background: ${diary.bgColor};`;
                const photoCount = diary.photos && diary.photos.length > 0 ? `<span style="position:absolute;bottom:5px;right:5px;background:rgba(200,100,120,0.8);color:white;padding:2px 8px;border-radius:10px;font-size:0.7rem;">📷 ${diary.photos.length}</span>` : '';
                
                return `
                    <div class="diary-entry" onclick="showDiaryDetail('${diary.date}')">
                        <div class="diary-entry-thumb" style="${thumbStyle}">
                            🐚
                            ${photoCount}
                        </div>
                        <div class="diary-entry-date">🐚 ${formatDate(diary.date)} 🐚</div>
                        <div class="diary-entry-preview">${(diary.text || '').slice(0, 50)}${(diary.text || '').length > 50 ? '...' : ''}</div>
                        <div class="diary-entry-actions">
                            <button class="load-btn" onclick="event.stopPropagation(); loadDiary('${diary.date}')">✏️ 加载</button>
                            <button class="delete-btn" onclick="event.stopPropagation(); confirmDeleteDiary('${diary.date}')">🗑️ 删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function showDiaryDetail(date) {
            const diaries = getDiaries();
            const diary = diaries.find(d => d.date === date);
            if (!diary) return;

            currentViewDiary = diary;
            diaryListPage.style.display = 'none';
            diaryDetailPage.style.display = 'block';

            const detailContent = document.getElementById('diaryDetailContent');
            const bgOpacity = diary.bgOpacity !== undefined ? diary.bgOpacity : 70;
            
            // 处理背景透明度
            if (diary.bgImage) {
                detailContent.style.background = `linear-gradient(rgba(255,255,255,${1 - bgOpacity/100}), rgba(255,255,255,${1 - bgOpacity/100})), url(${diary.bgImage})`;
                detailContent.style.backgroundSize = 'cover';
                detailContent.style.backgroundPosition = 'center';
            } else {
                const colors = diary.bgColor.match(/#[a-fA-F0-9]{6}/g) || ['#ffe4e8', '#fff5f5'];
                const color1 = hexToRgba(colors[0], bgOpacity / 100);
                const color2 = hexToRgba(colors[1] || colors[0], bgOpacity / 100);
                detailContent.style.background = `linear-gradient(135deg, ${color1}, ${color2})`;
            }

            document.getElementById('detailDate').textContent = '🐚 ' + formatDate(diary.date) + ' 🐚';
            
            // 渲染详情页照片
            const detailPhotos = document.getElementById('detailPhotos');
            if (diary.photos && diary.photos.length > 0) {
                detailPhotos.innerHTML = diary.photos.map(photo => 
                    `<img src="${photo}" class="diary-detail-photo" alt="日记照片">`
                ).join('');
            } else {
                detailPhotos.innerHTML = '';
            }
            
            const detailText = document.getElementById('detailText');
            detailText.textContent = diary.text || '';
            detailText.style.fontFamily = diary.font;
            detailText.style.fontSize = (diary.fontSize || 18) + 'px';
            detailText.style.color = diary.textColor || '#5a3a4a';
            detailText.style.opacity = (diary.textOpacity || 100) / 100;
        }

        function loadDiary(date) {
            const diaries = getDiaries();
            const diary = diaries.find(d => d.date === date);
            if (!diary) return;

            diaryDate.value = diary.date;
            diaryInput.value = diary.text || '';
            state.font = diary.font;
            state.fontSize = diary.fontSize;
            state.bgColor = diary.bgColor;
            state.bgOpacity = diary.bgOpacity;
            state.textColor = diary.textColor;
            state.textOpacity = diary.textOpacity;
            state.bgImage = diary.bgImage;
            state.photos = diary.photos || [];

            // 更新UI
            fontBtns.forEach(b => {
                b.classList.remove('active');
                if (b.dataset.font === diary.font) b.classList.add('active');
            });

            document.getElementById('bgOpacity').value = diary.bgOpacity;
            document.getElementById('bgOpacityValue').textContent = diary.bgOpacity + '%';
            document.getElementById('textOpacity').value = diary.textOpacity;
            document.getElementById('textOpacityValue').textContent = diary.textOpacity + '%';
            document.getElementById('fontSize').value = diary.fontSize;
            document.getElementById('fontSizeValue').textContent = diary.fontSize + 'px';
            document.getElementById('customTextColor').value = diary.textColor;

            renderPhotoPreviews();
            updatePreview();
            bookshelfModal.classList.remove('active');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function confirmDeleteDiary(date) {
            if (confirm('确定要删除这篇日记吗？')) {
                deleteDiary(date);
            }
        }

        // 重新下载 - 使用 html2canvas 截图详情页
        document.getElementById('reDownload').addEventListener('click', async () => {
            if (!currentViewDiary) return;
            
            const detailContent = document.getElementById('diaryDetailContent');
            const btn = document.getElementById('reDownload');
            
            try {
                btn.textContent = '📸 截图中...';
                btn.disabled = true;
                
                const canvas = await html2canvas(detailContent, {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: null,
                    logging: false
                });
                
                const link = document.createElement('a');
                link.download = `贝壳日记_${currentViewDiary.date}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
            } catch (err) {
                console.error('截图失败:', err);
                alert('截图失败，请重试');
            } finally {
                btn.textContent = '📥 重新下载';
                btn.disabled = false;
            }
        });

        // 加载编辑
        document.getElementById('reEdit').addEventListener('click', () => {
            if (currentViewDiary) {
                loadDiary(currentViewDiary.date);
            }
        });

        // 翻页
        prevPageBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderDiaryList();
            }
        });

        nextPageBtn.addEventListener('click', () => {
            const diaries = getDiaries();
            const totalPages = Math.ceil(diaries.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderDiaryList();
            }
        });

        // IndexedDB 相关
        const DB_NAME = 'ShellDiaryDB';
        const DB_VERSION = 1;
        let db = null;

        // 打开数据库
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('fonts')) {
                        db.createObjectStore('fonts', { keyPath: 'name' });
                    }
                };
            });
        }

        // 保存字体到 IndexedDB
        async function saveFontToDB(name, file) {
            if (!db) db = await openDB();
            const arrayBuffer = await file.arrayBuffer();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('fonts', 'readwrite');
                const store = tx.objectStore('fonts');
                const request = store.put({
                    name: name,
                    data: arrayBuffer,
                    fileName: file.name,
                    type: file.type || 'application/octet-stream'
                });
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // 从 IndexedDB 加载字体
        async function loadFontsFromDB() {
            try {
                if (!db) db = await openDB();
                const fonts = await new Promise((resolve, reject) => {
                    const tx = db.transaction('fonts', 'readonly');
                    const store = tx.objectStore('fonts');
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });

                for (const fontData of fonts) {
                    try {
                        const blob = new Blob([fontData.data], { type: fontData.type });
                        const url = URL.createObjectURL(blob);
                        const font = new FontFace(fontData.name, `url(${url})`);
                        await font.load();
                        document.fonts.add(font);
                        
                        // 添加到 UI
                        const newBtn = document.createElement('button');
                        newBtn.className = 'font-btn';
                        newBtn.dataset.font = fontData.name;
                        newBtn.textContent = '📎 ' + fontData.fileName.slice(0, 10);
                        newBtn.addEventListener('click', () => {
                            fontBtns.forEach(b => b.classList.remove('active'));
                            newBtn.classList.add('active');
                            state.font = fontData.name;
                            updatePreview();
                        });
                        document.querySelector('.font-buttons').appendChild(newBtn);

                        const fileDiv = document.createElement('div');
                        fileDiv.className = 'selected-file';
                        fileDiv.innerHTML = `📎 ${fontData.fileName.slice(0, 15)}... <span class="remove-file" onclick="removeDBFont('${fontData.name}', this)">✕</span>`;
                        document.getElementById('fontFiles').appendChild(fileDiv);
                        
                        state.customFonts.push({ name: fontData.name, file: fontData.fileName });
                    } catch (err) {
                        console.log('加载字体失败:', fontData.name, err);
                    }
                }
            } catch (err) {
                console.log('IndexedDB 加载失败:', err);
            }
        }

        // 删除 IndexedDB 中的字体
        async function removeDBFont(fontName, el) {
            try {
                if (!db) db = await openDB();
                await new Promise((resolve, reject) => {
                    const tx = db.transaction('fonts', 'readwrite');
                    const store = tx.objectStore('fonts');
                    const request = store.delete(fontName);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
                
                // 从 state 删除
                state.customFonts = state.customFonts.filter(f => f.name !== fontName);
                
                // 从 UI 删除
                const btn = document.querySelector(`.font-btn[data-font="${fontName}"]`);
                if (btn) btn.remove();
                el.parentElement.remove();
                
                // 重置字体
                if (state.font === fontName) {
                    state.font = "'Noto Serif SC', serif";
                    fontBtns.forEach(b => {
                        b.classList.remove('active');
                        if (b.dataset.font === state.font) b.classList.add('active');
                    });
                    updatePreview();
                }
            } catch (err) {
                console.log('删除字体失败:', err);
            }
        }

        // 初始化
        updateDiaryCount();
        loadFontsFromDB(); // 加载保存的字体
        updatePreview();

        // ========== 控制面板抽屉 ==========
        const panelToggle = document.getElementById('panelToggle');
        const panelOverlay = document.getElementById('panelOverlay');
        const controlPanel = document.getElementById('controlPanel');
        const closePanel = document.getElementById('closePanel');

        function openPanel() {
            controlPanel.classList.add('active');
            panelOverlay.classList.add('active');
        }

        function closeControlPanel() {
            controlPanel.classList.remove('active');
            panelOverlay.classList.remove('active');
        }

        panelToggle.addEventListener('click', openPanel);
        closePanel.addEventListener('click', closeControlPanel);
        panelOverlay.addEventListener('click', closeControlPanel);

        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            // 确保版权信息可见
            const copyrightEl = document.getElementById('deepSeaCopyright');
            if (copyrightEl) {
                copyrightEl.style.opacity = '1';
            }
        });
    </script>
</body>
</html>
